name: Deploy Token API

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, dummy-token]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install openssl (if needed)
        run: |
          sudo apt-get update
          sudo apt-get install -y openssl

      # ✅ GENERAR CLAVES EN TIEMPO DE BUILD
      - name: Generate JWT keys
        working-directory: dummy
        run: |
          mkdir -p src/main/resources/keys
          openssl genrsa -out src/main/resources/keys/private.pem 2048
          openssl rsa -in src/main/resources/keys/private.pem -pubout -out src/main/resources/keys/public.pem
          echo "✅ Claves generadas en $(pwd)/src/main/resources/keys/"
          ls -la src/main/resources/keys/

      - name: Set image tag
        id: vars
        run: echo "TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Make mvnw executable
        working-directory: dummy
        run: chmod +x mvnw

      - name: Clean and Build Quarkus app
        working-directory: dummy
        run: |
          ./mvnw clean package -DskipTests
          
          # Verificar que las claves están en el JAR
          echo "📋 Verificando claves en el JAR:"
          jar tf target/*.jar | grep -E "keys/(private|public).pem"
          
          # Si no están, copiarlas manualmente
          if ! jar tf target/*.jar | grep -q "keys/private.pem"; then
            echo "⚠️ Las claves no están en el JAR. Copiando manualmente..."
            mkdir -p target/classes/keys
            cp src/main/resources/keys/* target/classes/keys/
            jar uf target/*.jar -C target/classes/keys .
          fi

      - name: Verify keys in JAR (final)
        working-directory: dummy
        run: |
          echo "✅ Verificación final de claves en el JAR:"
          jar tf target/*.jar | grep -E "keys/(private|public).pem" && echo "✅ Claves encontradas" || echo "❌ Claves NO encontradas"

      - name: Build image
        working-directory: dummy
        run: podman build --no-cache -t localhost/dummy-api-token:${TAG} .

      - name: Save image
        run: podman save localhost/dummy-api-token:${TAG} -o dummy-api-token.tar

      - name: Import into k3s
        run: sudo k3s ctr images import dummy-api-token.tar

      - name: Create namespace
        run: |
          kubectl create namespace cqrs-lab \
          --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/deployment-dummy-api-token.yaml -n cqrs-lab
          kubectl apply -f k8s/service-dummy-api-token.yaml -n cqrs-lab

      - name: Update deployment image
        run: |
          kubectl set image deployment/dummy-api-token \
          dummy-api-token=localhost/dummy-api-token:${TAG} -n cqrs-lab

      - name: Restart rollout
        run: |
          kubectl rollout status deployment/dummy-api-token -n cqrs-lab